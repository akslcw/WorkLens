services:
  postgres:
    image: postgres:16
    container_name: worklens-postgres
    environment:
      POSTGRES_DB: ${WORKLENS_DB_NAME}
      POSTGRES_USER: ${WORKLENS_DB_USERNAME}
      POSTGRES_PASSWORD: ${WORKLENS_DB_PASSWORD}
    ports:
      - "${WORKLENS_DB_PORT:-5432}:5432"
    volumes:
      - worklens-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WORKLENS_DB_USERNAME} -d ${WORKLENS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  worklens-postgres-data:
