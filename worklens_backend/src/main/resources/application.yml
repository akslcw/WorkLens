spring:
  application:
    name: worklens-backend
  datasource:
    url: jdbc:postgresql://${WORKLENS_DB_HOST:127.0.0.1}:${WORKLENS_DB_PORT:5432}/${WORKLENS_DB_NAME:worklens}
    username: ${WORKLENS_DB_USERNAME}
    password: ${WORKLENS_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
worklens:
  llm:
    deepseek:
      base-url: ${WORKLENS_DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${WORKLENS_DEEPSEEK_API_KEY:}
      model: ${WORKLENS_DEEPSEEK_MODEL:deepseek-v4-flash}
      connect-timeout: ${WORKLENS_DEEPSEEK_CONNECT_TIMEOUT:5s}
      read-timeout: ${WORKLENS_DEEPSEEK_READ_TIMEOUT:15s}
